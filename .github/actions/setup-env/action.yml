name: "Setup Env"

description: "Install dependencies and checkout the code"
runs:
  using: composite
  steps:
    - name: Install Linux dependencies
      if: ${{ runner.os == 'Linux' }}
      run: |
        sudo apt update
        sudo apt install \
          gcc \
          g++ \
          libappindicator3-dev \
          libdbus-1-dev \
          libdrm-dev \
          libfontconfig-dev \
          libgtk-3-dev \
          libpulse-dev \
          libudev-dev \
          libx11-dev \
          libxdo-dev \
          pkg-config \
          protobuf-compiler
      shell: bash

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
