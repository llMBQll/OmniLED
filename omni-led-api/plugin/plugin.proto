syntax = 'proto3';

package plugin;

message Value {
  oneof value {
    bool v_bool = 1;
    int64 v_integer = 2;
    double v_float = 3;
    string v_string = 4;
    Array v_array = 5;
    Table v_table = 6;
    ImageData v_image_data = 7;
  }
}

message Array {
  repeated Value items = 1;
}

message Table {
  map<string, Value> items = 1;
}

message ImageData {
  ImageFormat format = 1;
  bytes data = 2;
}

enum ImageFormat {
  IMAGE_FORMAT_UNSPECIFIED = 0;
  IMAGE_FORMAT_PNG = 1;
  IMAGE_FORMAT_JPEG = 2;
  IMAGE_FORMAT_GIF = 3;
  IMAGE_FORMAT_WEBP = 4;
  IMAGE_FORMAT_PNM = 5;
  IMAGE_FORMAT_TIFF = 6;
  IMAGE_FORMAT_TGA = 7;
  IMAGE_FORMAT_DDS = 8;
  IMAGE_FORMAT_BMP = 9;
  IMAGE_FORMAT_ICO = 10;
  IMAGE_FORMAT_HDR = 11;
  IMAGE_FORMAT_OPEN_EXR = 12;
  IMAGE_FORMAT_FARBFELD = 13;
  IMAGE_FORMAT_AVIF = 14;
  IMAGE_FORMAT_QOI = 15;
  IMAGE_FORMAT_PCX = 16 [deprecated = true];
}
